---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: memristor-nn-dev
  labels:
    app: memristor-nn
    environment: development

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: memristor-nn-config
  namespace: memristor-nn-dev
data:
  ENVIRONMENT: development
  LOG_LEVEL: DEBUG
  METRICS_ENABLED: "true"
  SECURITY_LEVEL: INTERNAL
  SIMULATION_WORKERS: "2"
  CACHE_SIZE_MB: "512"

---
# Secret for sensitive configuration
apiVersion: v1
kind: Secret
metadata:
  name: memristor-nn-secrets
  namespace: memristor-nn-dev
type: Opaque
data:
  # Base64 encoded values (replace with actual secrets)
  database-password: cGFzc3dvcmQxMjM=
  api-key: YXBpLWtleS0xMjM0NTY=
  jwt-secret: and0LXNlY3JldC1rZXktMTIzNDU2Nzg5MA==

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memristor-nn
  namespace: memristor-nn-dev
  labels:
    app: memristor-nn
    environment: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memristor-nn
      environment: development
  template:
    metadata:
      labels:
        app: memristor-nn
        environment: development
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: memristor-nn
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: memristor-nn
        image: memristor-nn:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8443
          name: https
        - containerPort: 9090
          name: metrics
        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: memristor-nn-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: memristor-nn-config
              key: LOG_LEVEL
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: memristor-nn-secrets
              key: database-password
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: memristor-nn-secrets
              key: api-key
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: cache-volume
          mountPath: /app/cache
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: cache-volume
        emptyDir:
          sizeLimit: 1Gi

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: memristor-nn-service
  namespace: memristor-nn-dev
  labels:
    app: memristor-nn
    environment: development
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  selector:
    app: memristor-nn
    environment: development
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: https  
    port: 443
    targetPort: 8443
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: memristor-nn
  namespace: memristor-nn-dev
  labels:
    app: memristor-nn
    environment: development

---
# Role for application permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: memristor-nn-role
  namespace: memristor-nn-dev
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: memristor-nn-rolebinding
  namespace: memristor-nn-dev
subjects:
- kind: ServiceAccount
  name: memristor-nn
  namespace: memristor-nn-dev
roleRef:
  kind: Role
  name: memristor-nn-role
  apiGroup: rbac.authorization.k8s.io
